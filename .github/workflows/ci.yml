name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev --extra api

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest

      - name: Train smoke model
        run: |
          uv run python scripts/create_dataset.py --rows 1200
          uv run python scripts/train_model.py --rows 1200
          uv run python scripts/run_eval.py
